# ============================================
# BARISTA ROBOT CONFIGURATION
# 8 Stations + 4 Drinks
# ============================================

# Define all 8 station positions (robot poses from your SRDF)
stations:
  # Position 1: Home/Rest position
  home:
    joints: [0.0, 0.0, 0.0, 0.0]
    description: "Home/Rest position"
    action: "idle"
    action_duration: 0.5

  # Position 2: Cup Dispenser
  cup_dispenser:
    joints: [-1.5794, 0.7113, -1.57, 0.781]
    description: "Cup pickup station"
    action: "dispense_cup"
    action_duration: 2.0

  # Position 3: Ice Dispenser
  ice_dispenser:
    joints: [-1.57, 0.8414, -1.4312, 0.781]
    description: "Ice dispensing station"
    action: "dispense_ice"
    action_duration: 3.0

  # Position 4: Drink 1 Dispenser
  drink1_dispenser:
    joints: [-0.8157, 0.6852, -1.57, 0.538]
    description: "Drink 1 Dispenser"
    action: "dispense_drink1"
    action_duration: 4.0

  # Position 5: Drink 2 Dispenser
  drink2_dispenser:
    joints: [0.0521, 0.8848, -1.57, 0.8505]
    description: "Drink 2 Dispenser"
    action: "dispense_drink2"
    action_duration: 4.0

  # Position 6: Drink 3 Dispenser
  drink3_dispenser:
    joints: [0.0, 0.9541, -1.5006, 0.8505]
    description: "Drink 3 Dispenser"
    action: "dispense_drink3"
    action_duration: 4.0

  # Position 7: Drink 4 Dispenser
  drink4_dispenser:
    joints: [1.51, 0.9541, -1.5006, 0.8505]
    description: "Drink 4 Dispenser"
    action: "dispense_drink4"
    action_duration: 4.0

  # Position 8: Serving Station
  serving_station:
    joints: [1.57, 0.6679, -0.8587, 0.0]
    description: "Customer serving area"
    action: "serve_drink"
    action_duration: 2.0

# Define drink recipes (sequences of stations)
recipes:
  Drink1:
    name: "Drink1"
    description: "Drink 1 with ice"
    sequence:
      - station: home
      - station: cup_dispenser
      - station: ice_dispenser
      - station: drink1_dispenser
      - station: serving_station
      - station: home

  Drink2:
    name: "Drink2"
    description: "Drink 2 with ice"
    sequence:
      - station: home
      - station: cup_dispenser
      - station: ice_dispenser
      - station: drink2_dispenser
      - station: serving_station
      - station: home

  Drink3:
    name: "Drink3"
    description: "Drink 3 with ice"
    sequence:
      - station: home
      - station: cup_dispenser
      - station: ice_dispenser
      - station: drink3_dispenser
      - station: serving_station
      - station: home

  Drink4:
    name: "Drink4"
    description: "Drink 4 with ice"
    sequence:
      - station: home
      - station: cup_dispenser
      - station: ice_dispenser
      - station: drink4_dispenser
      - station: serving_station
      - station: home

# Robot motion settings
motion_settings:
  default_move_duration: 2.0    # seconds per move
  pause_at_station: 0.5         # seconds to pause after arriving
  interpolation_rate: 50        # Hz for smooth motion

# System settings
system:
  queue_enabled: true
  max_queue_size: 10
  status_update_rate: 1.0       # Hz
